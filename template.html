<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
  <link rel="icon" type="image/png" sizes="64x64" href="{{faviconUrl}}">
            <link rel="icon" href="{{faviconUrl}}">
            <link rel="shortcut icon" href="{{faviconUrl}}">
          
  <link rel="apple-touch-icon" sizes="180x180" href="{{appleTouchUrl}}">
  <meta name="description" content="{{projectName}}">
  <meta name="keywords" content="{{projectName}}">
  <title>{{projectName}}</title>
  <meta name="project-alias" content="{{alias}}">
          <script type="application/ld+json">
          {
            "@context": "https://schema.org",
            "@type": "Organization",
            "name": "{{projectName}}",
            "url": "window.location.origin",
            "logo": "{{faviconUrl}}"
          }
          </script>
           
          
          
  
  <!-- <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"> -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    .firework-gif-ad {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    @media (max-width:568px) {
      .firework-gif-ad {
        width: 150px;
      }
    }
      {{cssCache}}
  </style>
  <script type="module" crossorigin src="https://cdn.jsdelivr.net/gh/nischaldev/appbuilder-build@main/assets/index-XT5t-xq6.js"></script>
  <link rel="modulepreload" crossorigin href="https://cdn.jsdelivr.net/gh/nischaldev/appbuilder-build@main/assets/mftsccs-browser-D6KwdNNN.js">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/nischaldev/appbuilder-build@main/assets/index-BydaCWnD.css">
</head>

<body>
  <div id="app">
    {{htmlCache}}
  </div>
  <script>
    (function() {
      const logoUrl = "{{logoUrl}}";
      const defaultLogo = '<img src="' + logoUrl + '" alt="{{projectName}} logo" class="firework-gif-ad">';
      const app = document.getElementById('app');
      const windowRoute = window.location.pathname;

      // Show loading image if app is empty or on non-root routes
      if (app && (!app.innerHTML.trim() || windowRoute !== '/')) {
        app.innerHTML = defaultLogo;
      }
    })();
  </script>

</body>

</html>
